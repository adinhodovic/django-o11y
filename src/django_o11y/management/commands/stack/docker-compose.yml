services:
  tempo:
    image: grafana/tempo:2.10.1
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo.yaml
    tmpfs:
      - /tmp/tempo
    ports:
      - "3200:3200"

  loki:
    image: grafana/loki:3.6.6
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki

  prometheus:
    image: prom/prometheus:v3.5.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-remote-write-receiver
      - --enable-feature=exemplar-storage
      - --enable-feature=native-histograms
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  pyroscope:
    image: grafana/pyroscope:1.17.4
    ports:
      - "4040:4040"
    volumes:
      - pyroscope-data:/var/lib/pyroscope

  grafana:
    image: grafana/grafana:12.3.3
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"

  grafana-import:
    image: alpine:3.23.3
    depends_on:
      - grafana
    volumes:
      - ./import-dashboards.sh:/import-dashboards.sh:ro
    command: sh -c "apk add --no-cache curl jq && sh /import-dashboards.sh"
    restart: "no"

  alloy:
    image: grafana/alloy:v1.13.1
    ports:
      - "12345:12345"
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./alloy-config.alloy:/etc/alloy/config.alloy
    tmpfs:
      - /var/lib/alloy/data
    command: run --server.http.listen-addr=0.0.0.0:12345 --server.http.enable-pprof=false --storage.path=/var/lib/alloy/data /etc/alloy/config.alloy
    depends_on:
      - tempo
      - loki
      - prometheus
      - pyroscope
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  tempo-data:
  loki-data:
  prometheus-data:
  pyroscope-data:
  grafana-data:
  alloy-data:
