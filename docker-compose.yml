---
volumes:
  sqlite-data:

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: tests/Dockerfile
    command: python manage.py migrate --noinput
    environment:
      DJANGO_SETTINGS_MODULE: tests.config.settings.local
    volumes:
      - sqlite-data:/data
    depends_on:
      redis:
        condition: service_healthy

  django:
    container_name: django-app
    build:
      context: .
      dockerfile: tests/Dockerfile
    entrypoint: python manage.py runserver 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: tests.config.settings.local
      OTEL_SERVICE_NAME: django-app
      DJANGO_O11Y_LOGGING_FILE_PATH: /tmp/django-o11y/django.log
    volumes:
      - ${DJANGO_O11Y_STACK_LOG_MOUNT:-/tmp/django-o11y}:/tmp/django-o11y
      - sqlite-data:/data
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./tests
          target: /app/tests
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: uv.lock
    depends_on:
      migrate:
        condition: service_completed_successfully

  celery:
    build:
      context: .
      dockerfile: tests/Dockerfile
    entrypoint: celery -A tests.celery_app worker
    environment:
      DJANGO_SETTINGS_MODULE: tests.config.settings.local
      OTEL_SERVICE_NAME: celery-worker
      DJANGO_O11Y_LOGGING_FILE_PATH: /tmp/django-o11y/celery.log
    volumes:
      - ${DJANGO_O11Y_STACK_LOG_MOUNT:-/tmp/django-o11y}:/tmp/django-o11y
      - sqlite-data:/data
    ports:
      - "8009:8009"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app/src
        - action: sync+restart
          path: ./tests
          target: /app/tests
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: uv.lock
    depends_on:
      migrate:
        condition: service_completed_successfully

  task-generator:
    image: curlimages/curl:latest
    entrypoint: >
      sh -c "
        echo 'Waiting for django...';
        until curl -sf 'http://django:8000/trigger/?x=3&y=4'; do sleep 2; done;
        echo 'Django ready, generating tasks every 5s';
        while true; do
          curl -sf 'http://django:8000/trigger/?x=3&y=4';
          sleep 5;
        done
      "
    depends_on:
      - django

  ws-generator:
    image: python:3.12-slim
    entrypoint:
      - sh
      - -c
      - |
        pip install -q websockets
        python - <<'EOF'
        import asyncio, json, websockets

        WS_URL = "ws://django:8000/ws/echo/"
        CONNECTION_TTL = 15

        async def run():
            print("ws-generator: waiting for django WebSocket...")
            while True:
                try:
                    async with websockets.connect(WS_URL) as ws:
                        print("ws-generator: connected")
                        n = 0
                        deadline = asyncio.get_event_loop().time() + CONNECTION_TTL
                        while asyncio.get_event_loop().time() < deadline:
                            await ws.send(json.dumps({"msg": "hello", "n": n}))
                            reply = await ws.recv()
                            print("ws-generator: echo", reply)
                            n += 1
                            await asyncio.sleep(5)
                        print("ws-generator: reconnecting")
                except Exception as exc:
                    print("ws-generator: error", exc)
                    await asyncio.sleep(3)

        asyncio.run(run())
        EOF
    depends_on:
      - django
