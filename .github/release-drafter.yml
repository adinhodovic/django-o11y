---
name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feat'
      - 'feature'
  - title: '🐛 Bug Fixes'
    labels:
      - 'fix'
      - 'bugfix'
      - 'revert'
  - title: '📚 Documentation'
    labels:
      - 'docs'
      - 'documentation'
  - title: '🔧 Maintenance'
    labels:
      - 'build'
      - 'chore'
      - 'ci'
      - 'style'
      - 'refactor'
      - 'perf'
      - 'test'
change-template: '- $TITLE @$AUTHOR (#$NUMBER)'
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels:
      - 'major'
      - 'breaking'
  minor:
    labels:
      - 'feat'
      - 'feature'
  patch:
    labels:
      - 'fix'
      - 'bugfix'
      - 'build'
      - 'chore'
      - 'ci'
      - 'docs'
      - 'style'
      - 'refactor'
      - 'perf'
      - 'test'
      - 'revert'
  default: patch
template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/adinhodovic/django-o11y/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

autolabeler:
  - label: 'breaking'
    body:
      - '/BREAKING CHANGE.*/'
  - label: 'feat'
    title:
      - '/^feat(\(.*\))?:.*/'
  - label: 'fix'
    title:
      - '/^fix(\(.*\))?:.*/'
  - label: 'chore'
    title:
      - '/^chore(\(.*\))?:.*/'
  - label: 'ci'
    title:
      - '/^ci(\(.*\))?:.*/'
  - label: 'build'
    title:
      - '/^build(\(.*\))?:.*/'
  - label: 'docs'
    title:
      - '/^docs(\(.*\))?:.*/'
  - label: 'style'
    title:
      - '/^style(\(.*\))?:.*/'
  - label: 'refactor'
    title:
      - '/^refactor(\(.*\))?:.*/'
  - label: 'perf'
    title:
      - '/^perf(\(.*\))?:.*/'
  - label: 'test'
    title:
      - '/^test(\(.*\))?:.*/'
  - label: 'revert'
    title:
      - '/^revert(\(.*\))?:.*/'
