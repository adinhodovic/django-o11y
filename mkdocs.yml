site_name: Django Observability
site_description: OpenTelemetry observability for Django with traces, logs, metrics, and profiling
site_url: https://adinhodovic.github.io/django-o11y/
repo_url: https://github.com/adinhodovic/django-o11y
repo_name: adinhodovic/django-o11y
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
    - content.action.edit
    - content.action.view

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/adinhodovic/django-o11y
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/django-o11y/

plugins:
  - search
  - mike:
      alias_type: symlink
      canonical_version: null
      version_selector: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Usage Guide: usage.md
  - Configuration Reference: configuration.md
  - Utility Functions: utils.md
  - Demo Images: demo-images.md
