[tox]
envlist =
    ruff
    pylint
    py{312,313}-django{52,60}

[testenv]
# uv-venv-runner: uses uv pip install (fast) but reads deps= below, not the lockfile.
# This lets us override Django per factor while still getting uv's speed.
runner = uv-venv-runner
deps =
    django52: Django==5.2.*
    django60: Django==6.0.*
    django-observability[celery,redis,http,postgres,dev-logging]
    pytest
    pytest-clarity
    pytest-cov
    pytest-django
    pytest-mock
    celery
    redis
    requests
    django-prometheus
    prometheus-client
    opentelemetry-instrumentation-redis
    opentelemetry-instrumentation-requests
    opentelemetry-instrumentation-urllib3
package = editable
commands =
    pytest --cov=django_observability --cov-report=xml --cov-report=term -m "not integration"
setenv =
    PYTHONPATH = {toxinidir}:{env:PYTHONPATH:}

[testenv:ruff]
runner = uv-venv-lock-runner
extras = dev
package = skip
commands =
    ruff check .
    ruff format --check .

[testenv:pylint]
runner = uv-venv-lock-runner
extras = dev
package = editable
commands =
    pylint --django-settings-module=tests.settings src/django_observability tests

[pytest]
addopts = --ds=tests.settings --reuse-db -ra
testpaths = tests
norecursedirs = .git */migrations/* .venv

[coverage:run]
branch = True
source = django_observability
omit =
    ./.venv/*
    */migrations/*
    */apps.py

[coverage:report]
fail_under = 30
