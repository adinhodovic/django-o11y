[tox]
envlist =
    ruff
    pylint
    integration
    py{312,313}-django{52,60}

[testenv]
# uv-venv-runner: uses uv pip install (fast) but reads deps= below, not the lockfile.
# This lets us override Django per factor while still getting uv's speed.
runner = uv-venv-runner
extras = celery,redis,http,postgres,dev-logging
deps =
    django52: Django==5.2.*
    django60: Django==6.0.*
    pytest
    pytest-clarity
    pytest-cov
    pytest-django
    pytest-mock
    redis
    requests
package = editable
commands =
    pytest --cov=django_o11y --cov-report=xml --cov-report=term -m "not integration"
setenv =
    PYTHONPATH = {toxinidir}:{env:PYTHONPATH:}

[testenv:ruff]
runner = uv-venv-lock-runner
extras = dev
package = skip
commands =
    ruff check .
    ruff format --check .

[testenv:pylint]
runner = uv-venv-lock-runner
extras = dev,all
package = editable
commands =
    pylint --django-settings-module=tests.settings src/django_o11y tests

[testenv:integration]
runner = uv-venv-lock-runner
extras = dev,all
package = editable
commands =
    pytest -m integration tests/test_celery_e2e.py

[pytest]
addopts = --ds=tests.settings --reuse-db -ra
testpaths = tests
norecursedirs = .git */migrations/* .venv

[coverage:run]
branch = True
source = django_o11y
omit =
    ./.venv/*
    */migrations/*
    */apps.py

[coverage:report]
fail_under = 30
